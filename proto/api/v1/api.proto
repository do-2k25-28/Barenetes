syntax = "proto3";

package api.v1;

import "proto/shared/v1/resources.proto";
import "proto/shared/v1/container.proto";
import "proto/shared/v1/pod.proto";
import "proto/shared/v1/node.proto";

// ─── API-internal messages ────────────────────────────────────

// Observed state of a single container running on a node
message ContainerStatus {
  string name = 1;
  State state = 2;

  enum State {
    STATE_UNSPECIFIED = 0; 
    STATE_RUNNING     = 1;
    STATE_CRASHED     = 2;
    STATE_PENDING     = 3;
  }
}

// Full pod view: spec + runtime state
message PodDetail {
  shared.v1.PodWithSpec    core               = 1;
  repeated ContainerStatus container_statuses = 2;
  string                   pod_ip             = 3;
  string                   message            = 4;
  shared.v1.Resources      resource_usage     = 5;
  string                   node_id            = 6;
}

// Full node view: machine info + mounted volumes
message NodeDetail {
  shared.v1.Node  core    = 1;
  repeated string volumes = 2;
}

// ─── kubectl → API ────────────────────────────────────────────

message CreatePodRequest {
  shared.v1.PodWithSpec pod = 1;
}
message CreatePodResponse {
  PodDetail pod = 1;
}

message DeletePodRequest {
  string name      = 1;
  string namespace = 2;
}
message DeletePodResponse {
  PodDetail pod = 1;  // pod state at deletion time
}

message GetPodRequest {
  string name      = 1;
  string namespace = 2;
}
message GetPodResponse {
  PodDetail pod = 1;
}

message ListPodsRequest {}
message ListPodsResponse {
  repeated PodDetail pods = 1;
}

message GetNodeRequest {
  string name = 1;
}
message GetNodeResponse {
  NodeDetail node = 1;
}

message ListNodesRequest {}
message ListNodesResponse {
  repeated NodeDetail nodes = 1;
}

// ─── scheduler → API ──────────────────────────────────────────
message WatchPodsRequest {} // Scheduler subscribes to all pod events to decide what to schedule

message WatchPodEvent {
  string    event_type = 1;  // "ADDED", "MODIFIED", "DELETED", "SCHEDULED"
  PodDetail pod        = 2;
}


// ─── kubelet → API ────────────────────────────────────────────

// Kubelet registers itself at the beggining
message RegisterNodeRequest { 
  NodeDetail node = 1;
}
message RegisterNodeResponse {
  NodeDetail node = 1; 
}

message UpdatePodStatusRequest {
  shared.v1.PodWithSpec pod = 1;
}
message UpdatePodStatusResponse {}

message UpdateNodeStatusRequest {
  shared.v1.Node node = 1;
}
message UpdateNodeStatusResponse {}

message WatchDesiredStateRequest { // Kubelet subscribes to desired state for its node
  string node_name = 1;  
}
message WatchDesiredStateEvent {
  string                event_type = 1;  // "RUN", "STOP"
  shared.v1.PodWithSpec pod        = 2;  // pod concerned by the event
}


// ─── Services ─────────────────────────────────────────────────
service ApiServer {
  // kubectl → API
  rpc CreatePod  (CreatePodRequest)  returns (CreatePodResponse);
  rpc DeletePod  (DeletePodRequest)  returns (DeletePodResponse);
  rpc GetPod     (GetPodRequest)     returns (GetPodResponse);
  rpc ListPods   (ListPodsRequest)   returns (ListPodsResponse);
  rpc GetNode    (GetNodeRequest)    returns (GetNodeResponse);
  rpc ListNodes  (ListNodesRequest)  returns (ListNodesResponse);

  // scheduler → API
  rpc WatchPods  (WatchPodsRequest)  returns (stream WatchPodEvent);

  // kubelet → API
  rpc RegisterNode      (RegisterNodeRequest)      returns (RegisterNodeResponse);
  rpc UpdatePodStatus   (UpdatePodStatusRequest)   returns (UpdatePodStatusResponse);
  rpc UpdateNodeStatus  (UpdateNodeStatusRequest)  returns (UpdateNodeStatusResponse);
  rpc WatchDesiredState (WatchDesiredStateRequest) returns (stream WatchDesiredStateEvent);
}
