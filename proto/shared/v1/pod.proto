syntax = "proto3";

package shared.v1;

import "resources.proto";
import "container.proto";


enum PodStatus {
  PENDING = 0;
  RUNNING = 1;
  SUCCEEDED = 2;
  FAILED = 3;
  UNKNOWN = 4;
}

// Basic Pod for scheduling
message Pod {
  string name = 1;
  PodStatus status = 2;
  Resources requests = 3;
  Resources limits = 4;
}

message PodSpec {
  string namespace = 1;
  repeated Container containers = 2;
}

message PodWithSpec {
  Pod pod = 1;
  PodSpec spec = 2;
}