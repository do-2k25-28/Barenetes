syntax = "proto3";

package shared.v1;

import "resources.proto";

enum NodeStatus {
  READY = 0;
  CORDON = 1; // Cannot schedule pods
  DRAIN = 2; // Move all pods to other nodes
  NOT_READY = 3;
}

message Node {
  string name = 1;
  NodeStatus status = 2;
  Resources capacity = 3; // Total machine resources
  Resources allocatable = 4; // Capacity - Sum limits of Pod
}
