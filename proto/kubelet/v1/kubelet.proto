syntax = "proto3";

package kubelet.v1;

service Kubelet {
    // Create or update the desired state of a pod
    rpc ApplyPod(ApplyPodRequest) returns (ApplyPodResponse);

    rpc DeletePod(DeletePodRequest) returns (DeletePodResponse);
}

//
// Requests / Responses
//

message ApplyPodRequest {
    PodSpec pod = 1;
}

message ApplyPodResponse {
    string pod_id = 1;
}

message DeletePodRequest {
    string pod_id = 1;

    // Time to wait before force killing containers
    uint32 grace_period_seconds = 2;

    // Skip graceful shutdown
    bool force = 3;
}

message DeletePodResponse {
    bool success = 1;
}

//
// Pod Specification
//

message PodSpec {
    string pod_id = 1;

    string namespace = 2;

    repeated ContainerSpec containers = 3;

    // Used for service discovery / selectors
    map<string, string> labels = 4;

    // Metadata
    map<string, string> annotations = 5;
}

//
// Container Specification
//

message ContainerSpec {
    string name = 1;

    // OCI image reference
    string image = 2;

    repeated Port ports = 3;

    repeated EnvVar env = 4;

    repeated VolumeMount volume_mounts = 5;

    ResourceRequirements resources = 6;
}

//
// Networking
//

message Port {
    uint32 container_port = 1;
    uint32 host_port = 2;

    enum Protocol {
        TCP = 0;
        UDP = 1;
    }

    Protocol container_protocol = 3;
    Protocol host_protocol = 4;
}

//
// Environment Variables
//

message EnvVar {
    string name = 1;

    oneof value {
        string literal = 2;
        SecretRef secret = 3;
    }
}

message SecretRef {
    string secret_name = 1;
    string key = 2;
}

//
// Storage
//

message VolumeMount {
    string volume_name = 1;
    string mount_path = 2;
    string host_path = 3;
    bool read_only = 4;
}

//
// Resources
//

message ResourceRequirements {
    ResourceQuantity requests = 1;

    ResourceQuantity limits = 2;
}

message ResourceQuantity {
    uint64 memory_mb = 1;

    uint32 cpu_milli = 2;

    uint32 gpu = 3;
}

